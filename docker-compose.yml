services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nba_ev
      POSTGRES_PASSWORD: nba_ev_dev
      POSTGRES_DB: nba_ev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nba_ev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
